server:
  host: "0.0.0.0"
  port: 5002
  debug: false

logging:
  level: INFO

pipeline:
  maas:
    enabled: false

  ocr_api:
    api_host: ollama
    api_port: 11434
    api_path: /api/generate
    model: glm-ocr:latest
    api_mode: ollama_generate
    connect_timeout: 300
    request_timeout: 300

  page_loader:
    max_tokens: 16384
    temperature: 0.01
    image_format: JPEG
    min_pixels: 12544
    max_pixels: 71372800

  result_formatter:
    output_format: both

  enable_layout: false